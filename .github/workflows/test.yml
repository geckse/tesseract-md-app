name: Test

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  e2e:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with electron-vite
        run: npx electron-vite build

      # The raw mdvdb binary asset only exists once the CLI release is published.
      # If the download fails (asset/release not there yet), skip e2e with a
      # notice instead of failing the whole workflow.
      - name: Download mdvdb CLI
        id: mdvdb
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$RUNNER_TEMP/mdvdb-bin"
          cd "$RUNNER_TEMP/mdvdb-bin"
          gh release download "${{ vars.MDVDB_VERSION || 'v0.2.0' }}" -R geckse/markdown-vdb --pattern 'mdvdb-aarch64-apple-darwin'
          mv mdvdb-aarch64-apple-darwin mdvdb
          chmod +x mdvdb
          ./mdvdb --version
          echo "$RUNNER_TEMP/mdvdb-bin" >> "$GITHUB_PATH"

      - name: Notice — e2e skipped (mdvdb binary unavailable)
        if: steps.mdvdb.outcome == 'failure'
        run: echo "::notice title=e2e skipped::mdvdb CLI asset not downloadable from geckse/markdown-vdb (release not published yet?) — skipping Playwright e2e run."

      # No `playwright install` needed: playwright.config.ts defines a single
      # 'electron' project driven via _electron.launch(), which uses the
      # Electron binary from node_modules — no Playwright browsers required.
      - name: Run e2e tests
        if: steps.mdvdb.outcome == 'success'
        run: npm run test:e2e

  # First-time platform runs — allowed to fail while Windows/Linux support is
  # hardened (P1). Same guard as the mac job for the mdvdb binary.
  e2e-win:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with electron-vite
        run: npx electron-vite build

      - name: Download mdvdb CLI
        id: mdvdb
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$RUNNER_TEMP/mdvdb-bin"
          cd "$RUNNER_TEMP/mdvdb-bin"
          gh release download "${{ vars.MDVDB_VERSION || 'v0.2.0' }}" -R geckse/markdown-vdb --pattern 'mdvdb-x86_64-pc-windows-msvc.exe'
          mv mdvdb-x86_64-pc-windows-msvc.exe mdvdb.exe
          ./mdvdb.exe --version
          echo "$RUNNER_TEMP/mdvdb-bin" >> "$GITHUB_PATH"

      - name: Notice — e2e skipped (mdvdb binary unavailable)
        if: steps.mdvdb.outcome == 'failure'
        shell: bash
        run: echo "::notice title=e2e-win skipped::mdvdb CLI asset not downloadable from geckse/markdown-vdb (release not published yet?) — skipping Playwright e2e run."

      - name: Run e2e tests
        if: steps.mdvdb.outcome == 'success'
        run: npm run test:e2e

  e2e-linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with electron-vite
        run: npx electron-vite build

      - name: Download mdvdb CLI
        id: mdvdb
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$RUNNER_TEMP/mdvdb-bin"
          cd "$RUNNER_TEMP/mdvdb-bin"
          gh release download "${{ vars.MDVDB_VERSION || 'v0.2.0' }}" -R geckse/markdown-vdb --pattern 'mdvdb-x86_64-unknown-linux-gnu'
          mv mdvdb-x86_64-unknown-linux-gnu mdvdb
          chmod +x mdvdb
          ./mdvdb --version
          echo "$RUNNER_TEMP/mdvdb-bin" >> "$GITHUB_PATH"

      - name: Notice — e2e skipped (mdvdb binary unavailable)
        if: steps.mdvdb.outcome == 'failure'
        run: echo "::notice title=e2e-linux skipped::mdvdb CLI asset not downloadable from geckse/markdown-vdb (release not published yet?) — skipping Playwright e2e run."

      - name: Run e2e tests
        if: steps.mdvdb.outcome == 'success'
        run: xvfb-run --auto-servernum -- npm run test:e2e
