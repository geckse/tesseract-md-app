name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  # Manual smoke build: runs the exact same matrix but with --publish never,
  # so packaging (signing, notarization, installers) can be verified without
  # cutting a release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with electron-vite
        run: npx electron-vite build

      # Signing/notarization secrets are scoped to the mac leg ONLY.
      # win (unsigned beta) and linux get nothing but GH_TOKEN.
      - name: Build Electron app (mac, signed + notarized)
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish ${{ github.event_name == 'workflow_dispatch' && 'never' || 'always' }}

      - name: Build Electron app (${{ matrix.platform }})
        if: matrix.platform != 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} --publish ${{ github.event_name == 'workflow_dispatch' && 'never' || 'always' }}
